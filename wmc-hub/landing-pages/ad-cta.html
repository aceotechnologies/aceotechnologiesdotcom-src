<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/src/input.css">
    <title>Apply for aceotechnologies Web Development Program</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #f8f9fa;
            color: #ffffff;
        }
        main {
            width: 100vw;
            height: 100vh;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        .hero-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .content-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 600px;
        }
        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 16px;
            line-height: 1.2;
        }
        p {
            font-size: 1.2rem;
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 32px;
        }
        .ad-cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: #ffffff;
            color: #2b2622;
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 8px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            margin-bottom: 64px;
        }
        .ad-cta-btn:hover {
            background-color: #cccccc;
        }
        .ad-cta-btn:active {
            transform: scale(0.98);
        }
        .screen {
            position: absolute;
            top: 0px;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0,0,0,0.4);
            z-index: -1;
            overflow: hidden;
        }
        .screen img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            filter: brightness(32%) blur(2px);
        }
        .info-box {
            padding: 16px 5px;
            border-top: 2px solid white;
            text-align: start;
        }
        .info-box-blue {
            border-color: #473ddd;
        }
    </style>

</head>

<body>
    <main class="hero-container">
        <div class="content-box">
            <h1>Start this July 2026</h1>

            <p>15 Weeks Web Development Program</p>

            <a title="Apply today" href="https://docs.google.com/forms/d/e/1FAIpQLSfjdgscfIh1A8Lw8v6kt1bKG0r6SslzOz7Gcgcli6Kx57XKbg/viewform?usp=header" class="ad-cta-btn">
                <span>Apply today</span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="size-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
                </svg>                  
            </a>

            <div class="flex justify-between items-start gap-5 w-full max-w-lg py-4">
                <div class="info-box w-full lg:w-1/3">
                    First course starts free
                </div>

                <div class="info-box info-box-blue w-full lg:w-1/3">
                    Starts this July 2026
                </div>

                <div class="info-box w-full lg:w-1/3">
                    In-demand web stack
                </div>
            </div>
        </div>


        <div class="screen">
            <img src="/images/ad-cta-hero.jpg" alt="">
        </div>
    </main>
</body>
</html>
